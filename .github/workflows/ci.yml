name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql://mood_user:ci-password@localhost:5432/mood_db

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run check:lines
      - run: bun run knip
      - run: bun run sherif

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run typecheck

  build:
    needs: [quality, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: |
          cat > .env <<'ENVFILE'
          COMPOSE_PROJECT_NAME="mood"
          POSTGRES_USER="mood_user"
          POSTGRES_PASSWORD="ci-password"
          POSTGRES_DB="mood_db"
          POSTGRES_PORT=5450
          DATABASE_URL="postgresql://mood_user:ci-password@postgres:5432/mood_db"
          JWT_SECRET="ci-jwt-secret"
          JWT_EXPIRES_IN="1d"
          INVITATION_KEY="ci-invitation-key"
          BETTER_AUTH_SECRET="ci-auth-secret"
          BETTER_AUTH_URL="http://localhost:3000"
          DRAGONFLY_URL="redis://dragonfly:6379"
          NEXT_PUBLIC_APP_URL="http://localhost:3000"
          ENVFILE
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: mood-smoke:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm --entrypoint /bin/sh mood-smoke:${{ github.sha }} -lc "test -x /app/entrypoint.sh"
